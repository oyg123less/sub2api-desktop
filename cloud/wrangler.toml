name = "amber-cloud-api"
main = "src/index.ts"
compatibility_date = "2026-07-15"
workers_dev = true
preview_urls = false
routes = [
  { pattern = "api.amberapp.asia", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
MAILER_MODE = "resend"
RESEND_FROM = "Amber Verification <verify@mail.amberapp.asia>"

[[d1_databases]]
binding = "DB"
database_name = "amber-cloud"
database_id = "bab3a69b-ad29-4008-8089-31ca999c43dd"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "c258f96bc12a4b5682f8451be452b4ed"
preview_id = "1f85dbcea8884104a31544088df407b5"

[[durable_objects.bindings]]
name = "OWNER_RELAY"
class_name = "OwnerRelay"

[[durable_objects.bindings]]
name = "SHARE_ACCESS"
class_name = "ShareAccessCoordinator"

[[durable_objects.bindings]]
name = "SHARE_CONNECT_GUARD"
class_name = "ShareConnectGuard"

[[migrations]]
tag = "v0.4.0-relay"
new_sqlite_classes = ["OwnerRelay", "ShareAccessCoordinator"]

[[migrations]]
tag = "v0.4.2-connect-guard"
new_sqlite_classes = ["ShareConnectGuard"]
